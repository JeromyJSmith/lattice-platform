name: linear-sync-check

# Validates that every PR has a Linear issue ID in the title.
#
# Docs: meta/sync-contract.md

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
    branches:
      - main
      - feature/meta-harness
      - feature/phase-c-linear
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  linear-id-check:
    name: Require Linear ID in PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"

          # Allow [LAT-NNN], [MAR-NNN], or [MARPA-NNN] prefix (case-insensitive)
          if echo "$PR_TITLE" | grep -qiE '^\[(LAT|MAR|MARPA)-[0-9]+\]'; then
            echo "✓ Linear ID found in PR title."
          else
            echo ""
            echo "✗ PR title must start with a Linear issue ID."
            echo "  Expected format: [MARPA-XX] <type>(<scope>): <description>"
            echo "  Example:         [MARPA-47] feat(sync): add sync-contract.md"
            echo ""
            echo "  See meta/sync-contract.md for the full convention."
            exit 1
          fi

  linear-id-in-branch:
    name: Recommend Linear ID in branch name (advisory)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check for Linear ID in branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if echo "$BRANCH" | grep -qiE '(LAT|MAR|MARPA)-[0-9]+'; then
            echo "✓ Linear ID found in branch name: $BRANCH"
          else
            echo "⚠ Advisory: branch name does not include a Linear issue ID."
            echo "  Recommended: <type>/marpa-NNN-slug (e.g. feat/marpa-47-sync-contract)"
            echo "  This check is advisory and does not block merging."
          fi
