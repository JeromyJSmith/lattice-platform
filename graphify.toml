# graphify.toml — LATTICE repository graph configuration
# Used by the graphifyy package, which installs the `graphify` CLI.
#
# graphify update .       — AST refresh for changed code
# graphify extract .      — full semantic extraction when API keys are available
# graphify query "..."    — graph traversal against graphify-out/graph.json
# bash scripts/run-graphify-mcp.sh  — stdio MCP server over graphify-out/graph.json

[graph]
# Output directory for graph.json + cluster reports
output = "graphify-out"
# Format for graph output: json | dot | mermaid
format = "json"

[source]
# Directories to include in the code graph
include = [
  "src/server/runtime",
  "pixeltable/service",
  "scripts",
]
# Glob patterns to exclude
exclude = [
  "node_modules",
  ".pnp",
  "dist",
  ".git",
  "graphify-out",
  "**/*.min.js",
  "**/__pycache__",
]

[policy]
# Hotspot detection: flag nodes with degree > threshold
hotspot_degree_threshold = 10
# Cycle detection: surface dependency cycles for review
detect_cycles = true
# Dead code: flag unreferenced nodes
detect_dead_code = true
# Max depth for dependency traversal
max_depth = 8

[skill]
# Platform where graphify skills are installed (claude | codex | cursor | etc.)
platform = "codex"
# Output dir for generated skills (relative to repo root)
generated_skills_dir = ".claude/skills/generated"
