# .lattice-project.yaml — LATTICE project identity card
# -------------------------------------------------------
# Generated by: lattice project init
# Lives in the PROJECT directory (not inside the LATTICE repo).
# Committed to the PROJECT's own git repo.
#
# LATTICE reads this file to:
#   - Confirm project identity before any ingest or API call
#   - Scope Pixeltable writes to lattice/projects/<id>/
#   - Locate VW source files for the bridge

id: REPLACE_ME                          # e.g. juniper2026
name: "Replace with project name"       # e.g. "Grove — Juniper 2026"
lattice_platform: /Volumes/PixelTable/VW_iTWIN_Bridge/VW_iTwin_Bridge
pixeltable_namespace: lattice/projects/REPLACE_ME
created: "2026-05-13"

# VW source files (relative to this project directory)
vw_files:
  - path/to/file.vwx
  - path/to/export.ifc

# Optional: override the default API endpoint
# api_base: http://localhost:8001
