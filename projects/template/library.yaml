# library.yaml — LATTICE platform dependency declaration
# -------------------------------------------------------
# Generated by: lattice project init
# Lives in the PROJECT directory.
# Committed to the PROJECT's own git repo.
#
# This file declares:
#   1. Which LATTICE platform installation this project uses
#   2. Which shared Pixeltable tables this project reads from
#   3. Project-specific overrides (optional)

platform:
  name: LATTICE
  path: /Volumes/PixelTable/VW_iTWIN_Bridge/VW_iTwin_Bridge
  pixeltable_namespace: lattice/projects/REPLACE_ME   # owned namespace for writes
  api_base: http://localhost:8001

# Shared cross-project knowledge tables (READ-ONLY from project scripts).
# These accumulate learnings from every project and improve over time.
shared_knowledge:
  plant_classifications: lattice/knowledge/plant_classifications
  bis_class_overrides: lattice/knowledge/bis_class_overrides
  site_georef_anchors: lattice/knowledge/site_georef_anchors

# CRS and georef defaults for this project site
georef:
  crs: EPSG:4326          # WGS84 default; override with project EPSG
  anchor_lat: null        # set after first IFC parse
  anchor_lon: null
  anchor_z: 0.0

# IFC ingest defaults
ingest:
  ifc_version: IFC4.3
  normalize_coordinates: true
  batch_size: 50
