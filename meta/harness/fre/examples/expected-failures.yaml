    expected_failure_classes:
      - REQUIRED_FIELD_MISSING
    expected_fields:
      - id
  - example: examples/front-matter.invalid.missing-comparison-engine-refs.json
    schema: front-matter.schema.json
    expected_failure_classes:
      - REQUIRED_FIELD_MISSING
    expected_fields:
      - comparison_engine_refs
