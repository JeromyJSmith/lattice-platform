    expected_fields:
      - status_summary
  - example: examples/bridge-record.invalid.missing-proof-artifacts.json
    schema: bridge-record.schema.json
    expected_failure_classes:
      - REQUIRED_FIELD_MISSING
    expected_fields:
      - proof_artifacts
  - example: examples/bridge-record.invalid.missing-comparison-artifacts.json
    schema: bridge-record.schema.json
    expected_failure_classes:
      - REQUIRED_FIELD_MISSING
    expected_fields:
      - comparison_artifacts
