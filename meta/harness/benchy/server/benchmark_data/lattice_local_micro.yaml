benchmark_name: "LATTICE Local Micro"
purpose: "Quick comparison across our locally-cached MLX models — 3 prompts, 6 models, ~2-5 min total."
base_prompt: |
  <purpose>
      Generate a function for a given function-request. Then call the function with the provided arguments. Then print the result.
  </purpose>

  <instructions>
      <instruction>Generate only the function requested by the user.</instruction>
      <instruction>Fill in the function body with the appropriate code.</instruction>
      <instruction>Do not include any other text.</instruction>
      <instruction>Write code in python 3.</instruction>
      <instruction>Generate the function, call the function, and print the result.</instruction>
      <instruction>Your code must be immediately executed as is.</instruction>
  </instructions>

  <function-request>
      {{function}}
  </function-request>

  <function-arguments>
      {{arguments}}
  </function-arguments>
evaluator: "execute_python_code_with_string_output"
models:
  - "mlx~prism-ml/Ternary-Bonsai-1.7B-mlx-2bit"
  - "mlx~prism-ml/Ternary-Bonsai-4B-mlx-2bit"
  - "mlx~prism-ml/Ternary-Bonsai-8B-mlx-2bit"
  - "mlx~mlx-community/Hermes-3-Llama-3.1-8B-4bit"
  - "mlx~unsloth/Qwen3.6-35B-A3B-UD-MLX-4bit"
  - "mlx~mlx-community/gemma-4-26b-a4b-it-4bit"

prompts:
  - dynamic_variables:
      function: "def add(a, b): int - add two numbers"
      arguments: "5, 7"
    expectation: "12"

  - dynamic_variables:
      function: "def is_palindrome(s: str) -> bool - return True if s reads the same forwards and backwards (case-insensitive, ignoring spaces)"
      arguments: '"A man a plan a canal Panama"'
    expectation: "True"

  - dynamic_variables:
      function: "def parse_wkt_point(wkt: str) -> tuple[float, float] - parse a WKT POINT string like 'POINT(-122.4 37.8)' and return (lon, lat)"
      arguments: '"POINT(-122.4 37.8)"'
    expectation: "(-122.4, 37.8)"
