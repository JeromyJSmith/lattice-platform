# spec-verified: local fractal lifecycle pilot 2026-05-18
tool: infranodus
manifest_version: 0.1.0
harvest_surface: analysis/infranodus/infranodus-capability-harvest.md
registry_surface: analysis/capabilities/infranodus-capability-registry.yaml
schema_map_surface: analysis/infranodus/infranodus-schema-map.md
goal_surface: meta/harness/docs/specs/fre-meta-wrapper-seven.gates.md
golden_path_surface: meta/harness/docs/specs/fre-fractal-contract-package.plan.md
capability_groups:
  comparison_core:
    description: Core comparison and gap-analysis surfaces required by the wrapper.
    rows:
      - analyze_text
      - create_knowledge_graph
      - analyze_existing_graph_by_name
      - generate_content_gaps
      - develop_latent_topics
      - develop_conceptual_bridges
      - generate_topical_clusters
      - difference_between_texts
      - generate_contextual_hint
      - retrieve_from_knowledge_base
  supporting_skills:
    description: Skills that help interpret or operationalize the comparison outputs.
    rows:
      - ontology-creator-skill
      - graph-rag-skill
      - content-gap-skill
  explicit_non_scope:
    description: Harvested rows that remain visible but are not part of the current wrapper slice.
    rows:
      - generate_seo_report
      - analyze_google_search_results
      - generate_research_questions
      - generate_research_ideas
      - develop_text_tool
      - optimize_text_structure
      - overlap_between_texts
      - merged_graph_from_texts
      - memory_add_relations
      - memory_get_relations
lifecycle_hooks:
  harvest_gate:
    required_rows:
      - analyze_text
      - create_knowledge_graph
    required_artifacts:
      - analysis/infranodus/infranodus-capability-harvest.md
    purpose: Normalize and package source corpora before graph analysis.
  registry_gate:
    required_rows:
      - analyze_existing_graph_by_name
      - generate_topical_clusters
    required_artifacts:
      - analysis/capabilities/infranodus-capability-registry.yaml
    purpose: Keep canonical naming and relation vocabulary coherent.
  manifest_gate:
    required_rows:
      - difference_between_texts
      - generate_topical_clusters
    required_artifacts:
      - analysis/infranodus/infranodus-capability-manifest.yaml
      - analysis/infranodus/infranodus-schema-map.md
    purpose: Place InfraNodus capabilities consistently across wrapper and proof surfaces.
  verification_gate:
    required_rows:
      - difference_between_texts
      - generate_contextual_hint
    required_artifacts:
      - analysis/infranodus/goal-vs-implementation.diff.json
    purpose: Emit durable comparison evidence for bounded slices.
  state_gate:
    required_rows:
      - generate_content_gaps
      - difference_between_texts
    required_artifacts:
      - analysis/infranodus/goal-vs-implementation.diff.json
    purpose: Challenge unsupported green claims and justify exact blockers.
  health_gate:
    required_rows:
      - difference_between_texts
      - develop_latent_topics
      - develop_conceptual_bridges
    required_artifacts:
      - analysis/infranodus/goal-vs-implementation.diff.json
    purpose: Detect drift, bottlenecks, and missing bridges across repo truth surfaces.
  promotion_gate:
    required_rows:
      - generate_content_gaps
      - generate_contextual_hint
      - retrieve_from_knowledge_base
    required_artifacts:
      - analysis/infranodus/goal-vs-implementation.diff.json
    purpose: Feed promotion decisions with graph-backed evidence rather than prose-only judgment.
proof_package_hooks:
  source:
    rows:
      - analyze_text
      - create_knowledge_graph
    artifacts:
      - analysis/infranodus/infranodus-capability-harvest.md
  schema:
    rows:
      - difference_between_texts
      - generate_topical_clusters
    artifacts:
      - analysis/infranodus/infranodus-schema-map.md
  examples:
    rows:
      - analyze_existing_graph_by_name
      - generate_contextual_hint
    artifacts:
      - analysis/infranodus/README.md
      - meta/harness/fre/examples/front-matter.valid.json
      - meta/harness/fre/examples/front-matter.invalid.missing-id.json
      - meta/harness/fre/examples/front-matter.invalid.missing-comparison-engine-refs.json
      - meta/harness/fre/examples/gate-progress.valid.json
      - meta/harness/fre/examples/gate-progress.invalid.unknown-gate-id.json
      - meta/harness/fre/examples/gate-progress.invalid.verification-comparison-disabled.json
      - meta/harness/fre/examples/bottom-matter.valid.json
      - meta/harness/fre/examples/bottom-matter.invalid.missing-status-summary.json
      - meta/harness/fre/examples/bridge-record.valid.json
      - meta/harness/fre/examples/bridge-record.invalid.missing-proof-artifacts.json
      - meta/harness/fre/examples/bridge-record.invalid.missing-comparison-artifacts.json
      - meta/harness/fre/examples/fre-loop.valid.json
      - meta/harness/fre/examples/fre-loop.invalid.missing-promotion-in-authority.json
      - meta/harness/fre/examples/gate-result.valid.json
      - meta/harness/fre/examples/gate-result.invalid.missing-comparison-engine.json
      - meta/harness/fre/examples/repair-task.valid.json
      - meta/harness/fre/examples/repair-task.invalid.bad-blocking-gate-id.json
      - meta/harness/fre/examples/promotion-decision.valid.json
      - meta/harness/fre/examples/promotion-decision.invalid.missing-comparison-engine.json
  expected_failures:
    rows:
      - generate_content_gaps
      - develop_latent_topics
    artifacts:
      - .claude/rules/infranodus-corpus.md
  tests:
    rows:
      - difference_between_texts
      - generate_topical_clusters
    artifacts:
      - analysis/infranodus/infranodus-schema-map.md
    verifiers:
      - path: meta/harness/fre/tests/test_document_contract.py
        description: Contains test_comparison_contract_status_reports_clean_slice — verifies that all comparison-bearing FRE surfaces declare InfraNodus hooks. This is the primary InfraNodus comparison enforcement verifier.
      - path: meta/harness/fre/tests/test_examples_validate.py
        description: Verifies that the canonical valid fixtures for comparison-bearing FRE surfaces still satisfy the governed schemas after the InfraNodus hook fields are enforced.
      - path: meta/harness/fre/tests/test_failure_examples_fail.py
        description: Verifies that invalid fixtures (including missing comparison_engine_refs, comparison_artifacts, and comparison_engine on gate-result and promotion-decision surfaces) fail schema validation as expected.
      - path: meta/harness/fre/tests/test_schema_validity.py
        description: Validates all 8 FRE schemas as valid Draft 2020-12 schemas, including those with InfraNodus hook enforcement via allOf conditionals.
    proof_surfaces:
      - path: meta/harness/fre/evaluation/contract-tests.txt
        description: Captured test output. Pass state is the proof that comparison enforcement is live.
      - path: meta/harness/fre/evaluation/example-validation.json
        description: Example validation output proving that comparison-hook invalid fixtures are correctly rejected.
  evaluation:
    rows:
      - difference_between_texts
      - generate_content_gaps
      - generate_contextual_hint
    artifacts:
      - analysis/infranodus/goal-vs-implementation.diff.json
  promotion:
    rows:
      - generate_content_gaps
      - retrieve_from_knowledge_base
    artifacts:
      - analysis/infranodus/infranodus-schema-map.md
