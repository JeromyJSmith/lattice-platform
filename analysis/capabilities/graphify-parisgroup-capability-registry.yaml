# spec-verified: code.claude.com/docs 2026-05-11
tool: graphify-parisgroup
tool_version: pinned at Phase 1 install (curl install.sh)
canonical_docs: https://github.com/parisgroup-ai/graphify
last_harvested: 2026-05-11
harvested_by: claude-opus-4-7 (Amendment 06)

# 18 CLI commands + 9 MCP tools + 5 slash commands + 3 skills + 2 agents

capabilities:
  # ─── CLI COMMANDS (18) ───
  - id: cli-init
    surface: cli_command
    name: graphify init
    state: ACTIVE
    description: Generate graphify.toml in current repo
    wired_at: [graphify.toml]
    invoked_by: [Phase 1 install step]

  - id: cli-run
    surface: cli_command
    name: graphify run
    state: BLOCKED
    description: Execute full analysis pass; writes meta/harness/graph-reports/
    blocker: Installed CLI on 2026-05-13 does not expose `graphify run`; bounded proof used `graphify update .`
    blocker_resolution_path: Replace this harvested row with a real `graphify update` row during the next Graphify re-harvest

  - id: cli-check
    surface: cli_command
    name: graphify check
    state: ACTIVE
    description: CI gate — fails on cycles or hotspot threshold violations
    wired_at: [".github/workflows/docs-sync-check.yml (Phase 7 Job 13)"]
    invoked_by: [CI]

  - id: cli-install-integrations
    surface: cli_command
    name: graphify install-integrations
    state: BLOCKED
    description: Writes .claude/ skills + MCP config (--project-local mode)
    blocker: Installed CLI on 2026-05-13 uses platform-specific install commands such as `graphify codex install`
    blocker_resolution_path: Replace this harvested row with platform-specific install rows during the next Graphify re-harvest

  - id: cli-stats
    surface: cli_command
    name: graphify stats
    state: ACTIVE
    description: Print summary statistics (node count, hotspots, cycles)
    wired_at: [meta/harness/bootstrap/health-report.py]
    invoked_by: [health snapshot generation]

  - id: cli-search
    surface: cli_command
    name: graphify search <pattern>
    state: ACTIVE
    description: Search symbols/files by pattern
    wired_at: [".claude/skills/lattice-schema/SKILL.md (Phase 6)"]
    invoked_by: [section harnesses]

  - id: cli-explain
    surface: cli_command
    name: graphify explain <symbol>
    state: ACTIVE
    description: Explain symbol's role in graph (centrality, dependents)
    wired_at: [".claude/skills/lattice-frontend/SKILL.md (Phase 6)"]
    invoked_by: [frontend harness pre-edit reads]

  - id: cli-hotspots
    surface: cli_command
    name: graphify hotspots
    state: ACTIVE
    description: List hub vs bridge vs mixed hotspots above threshold
    wired_at: [meta/harness/bootstrap/health-report.py]
    invoked_by: [graph_structural_health signal]

  - id: cli-cycles
    surface: cli_command
    name: graphify cycles
    state: ACTIVE
    description: "List import cycles (target: zero)"
    wired_at: [meta/harness/bootstrap/health-report.py]
    invoked_by: [graph_structural_health signal]

  - id: cli-impact
    surface: cli_command
    name: graphify impact <file>
    state: DEFERRED
    description: Blast-radius analysis for a file change
    reason: redundant-with-other-tool
    target_phase: revisit-if-gitnexus-impact-insufficient
    tracking_issue: 19

  - id: cli-diff
    surface: cli_command
    name: graphify diff <snapshot1> <snapshot2>
    state: ACTIVE
    description: Compare two analysis snapshots; detects architectural drift
    wired_at: [".github/workflows/docs-sync-check.yml (Phase 7 Job 13)"]
    invoked_by: [CI on PRs]

  - id: cli-export
    surface: cli_command
    name: graphify export <format>
    state: ACTIVE
    description: Export analysis to JSON/CSV/Markdown/HTML/Neo4j
    wired_at: ["graphify.toml (format= setting)"]
    invoked_by: [graphify run]

  - id: cli-policy-check
    surface: cli_command
    name: graphify policy-check
    state: ACTIVE
    description: Enforce policy rules (no-context-bleed, no-revit-imports)
    wired_at: ["graphify.toml (policy.rule blocks)"]
    invoked_by: [graphify check + CI]

  - id: cli-list-projects
    surface: cli_command
    name: graphify list-projects
    state: DEFERRED
    description: List configured project sections
    reason: redundant-with-other-tool
    target_phase: never (cat graphify.toml achieves same)
    tracking_issue: 19

  - id: cli-list-hotspots-by-project
    surface: cli_command
    name: graphify hotspots --project <name>
    state: ACTIVE
    description: Per-project hotspot drill-down
    wired_at: ["meta/harness/sections/*/HARNESS.md (Phase 4)"]
    invoked_by: [section harnesses]

  - id: cli-version
    surface: cli_command
    name: graphify version
    state: ACTIVE
    description: Print installed version
    wired_at: ["meta/harness/bootstrap/health-report.py (tool_version field)"]
    invoked_by: [tool-version reporting]

  - id: cli-update
    surface: cli_command
    name: graphify update
    state: DEFERRED
    description: Self-update binary
    reason: out-of-scope-for-current-phase
    target_phase: post-Phase-8 (manual update only until then)
    tracking_issue: 19

  - id: cli-uninstall
    surface: cli_command
    name: graphify uninstall
    state: BLOCKED
    description: Self-uninstall
    blocker: Not needed; manual rm sufficient
    blocker_resolution_path: Permanent BLOCKED

